<h2>Paginas</h2>
<hr>

<h3 class="mt-3">Reactive</h3>
<ul class="list-group">

    @for(item of reactiveMenu; track item.title){
        <a [routerLink]="item.route" routerLinkActive="active" class="list-group-item">
            {{item.title}}
        </a>
    }
</ul>
